services:
  merge-queue:
    build: .
    container_name: merge-queue
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - merge-queue-data:/app/data
    environment:
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3000}
      - SESSION_SECRET=${SESSION_SECRET}
      - PROCESSOR_INTERVAL=${PROCESSOR_INTERVAL:-15}
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.merge-queue.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.merge-queue.entrypoints=websecure"
      - "traefik.http.routers.merge-queue.tls.certresolver=letsencrypt"
      - "traefik.http.services.merge-queue.loadbalancer.server.port=3000"
    networks:
      - traefik
      - default

volumes:
  merge-queue-data:

networks:
  traefik:
    external: true
