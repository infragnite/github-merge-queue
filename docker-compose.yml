services:
  merge-queue:
    build: .
    container_name: merge-queue
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - merge-queue-data:/app/data
    environment:
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3000}
      - SESSION_SECRET=${SESSION_SECRET}
      - PROCESSOR_INTERVAL=${PROCESSOR_INTERVAL:-15}
      - NODE_ENV=production

volumes:
  merge-queue-data:
